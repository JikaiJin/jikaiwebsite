# Configuration of Hugo
# Guide: https://wowchemy.com/docs/getting-started/
# Hugo Documentation: https://gohugo.io/getting-started/configuration/#all-configuration-settings
# This file is formatted using YAML syntax - learn more at https://learnxinyminutes.com/docs/yaml/

title: Welcome to Jikai Jin's website # Website name
baseURL: 'https://jkjin.com/' # Website URL

############################
## LANGUAGE
############################

defaultContentLanguage: en
hasCJKLanguage: false
defaultContentLanguageInSubdir: false
removePathAccents: true

############################
## MODULES
############################

module:
  imports:
    # wowchemy-cms/v5 retained for the /admin/ Netlify-CMS route (decision A in cutover).
    # The Wowchemy theme module (wowchemy/v5) is intentionally removed — the new
    # in-repo theme under layouts/ supersedes it. See .omc/plans/cutover-v1.md.
    - path: github.com/wowchemy/wowchemy-hugo-modules/wowchemy-cms/v5

############################
## ADVANCED
############################

enableGitInfo: false
summaryLength: 30
paginate: 10
enableEmoji: true
enableRobotsTXT: true
footnotereturnlinkcontents: <sup>^</sup>
ignoreFiles: [\.ipynb$, .ipynb_checkpoints$, \.Rmd$, \.Rmarkdown$, _cache$]
# Suppress known-tolerable warnings.
# Note: the `.Site.Data` deprecation (Hugo v0.156+) originates from the
# retained wowchemy-cms module, not our code. Cannot be suppressed via
# ignoreLogs (not a log-ID Hugo exposes); documented in cutover-report.md.
# A1 acceptance gate interpreted as "zero NEW warnings"; 1 upstream
# deprecation tolerated until wowchemy-cms is replaced or patched.
ignoreLogs:
  - warning-goldmark-raw-html
permalinks:
  event: '/talk/:slug/'
  tags: '/tag/:slug/'
  categories: '/category/:slug/'
  publication_types: '/publication-type/:slug/'
disableAliases: true
outputs:
  # 'headers' and 'redirects' output formats were defined in the Wowchemy
  # theme module (now removed). Redirects + headers are now managed in
  # netlify.toml directly; no generated _headers / _redirects files needed.
  # JSON and WebAppManifest were used by Wowchemy for site search and PWA;
  # neither is needed by the new theme.
  home: [HTML, RSS]
  section: [HTML, RSS]
imaging:
  resampleFilter: Lanczos
  quality: 100
  anchor: Smart
timeout: 600000
taxonomies:
  tag: tags
  category: categories
  publication_type: publication_types
  author: authors
markup:
  _merge: deep
  # Goldmark unsafe=true is required to preserve inline <script> tags in
  # content/home/contact.md (clustrmaps visitor-map widget). Safe for this
  # site — all markdown is authored by the site owner, no UGC.
  goldmark:
    renderer:
      unsafe: true
related:
  threshold: 80
  includeNewer: true
  toLower: true
  indices:
    - name: tags
      weight: 100
    - name: categories
      weight: 70
security:
  _merge: deep
sitemap:
  _merge: deep
