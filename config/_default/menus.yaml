# Navigation Links
#   To link a homepage widget, specify the URL as a hash `#` followed by the filename of the
#     desired widget in your `content/home/` folder.
#   The weight parameter defines the order that the links will appear in.

main:
  - name: Home
    url: '#about'
    weight: 10
  - name: Publications
    # The Recent Publications widget is deactivated on the home page, so
    # the nav lands on the full publications index at /publication/.
    # (Home still ships a curated "Featured Publications" subset at
    # #featured.)
    url: '/publication/'
    weight: 50
  - name: Contact
    url: '#contact'
    weight: 70
  - name: News
    url: '#recent_news'
    weight: 20
  - name: Blog
    url: '/prescriptive-scaling/'
    weight: 40
  - name: Gallery
    url: '/gallery/'
    weight: 55
  - name: Experience
    url: '#experience'
    weight: 60

