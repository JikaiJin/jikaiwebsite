[build]
  command = "hugo --gc --minify -b $URL"
  publish = "public"

[build.environment]
  HUGO_VERSION = "0.159.2"
  HUGO_ENABLEGITINFO = "true"

[context.production.environment]
  HUGO_ENV = "production"

[context.deploy-preview]
  command = "hugo --gc --minify --buildFuture -b $DEPLOY_PRIME_URL"

[context.branch-deploy]
  command = "hugo --gc --minify -b $DEPLOY_PRIME_URL"

# netlify-plugin-hugo-cache-resources removed in cutover (decision C).
# Plugin was not known-compatible with Hugo 0.159.2; tradeoff is slower
# first-time module downloads on each branch-deploy (~10–15s), accepted
# as simpler than version-pinning the plugin. Cache behavior falls back
# to Netlify's default build cache.

[[redirects]]
  from = "/post/prescriptive-scaling/"
  to = "/prescriptive-scaling/"
  status = 301
  force = true

[[redirects]]
  from = "/blog/prescriptive-scaling/"
  to = "/prescriptive-scaling/"
  status = 301
  force = true

[[redirects]]
  from = "/blog/prescriptive-scaling/*"
  to = "/prescriptive-scaling/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/prescriptive-scaling/"
  to = "/blog/prescriptive-scaling/"
  status = 200

[[redirects]]
  from = "/prescriptive-scaling/*"
  to = "/blog/prescriptive-scaling/:splat"
  status = 200
