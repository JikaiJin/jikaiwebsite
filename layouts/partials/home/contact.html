{{- /*
  Contact — pulls body of content/home/contact.md verbatim. The body
  contains the clustrmaps <script> that MUST be preserved per A10.
  Goldmark unsafe-HTML is allowed for this partial to render the script tag.
*/ -}}
{{- $contact := site.GetPage "home/contact" -}}
{{- $author := site.GetPage "authors/admin" -}}
<section class="home-section" id="contact"
         style="padding-block: var(--space-8);">
  <h2 style="font-family: var(--font-ui); font-size: var(--fs-caption);
             font-weight: 500; text-transform: uppercase;
             letter-spacing: 0.12em; color: var(--ink-muted);
             margin: 0 0 var(--space-5);">Contact</h2>
  <p>Best reached by email:
    <a href="mailto:{{ $author.Params.email }}"
       style="color: var(--accent);">{{ $author.Params.email }}</a>.
  </p>
  {{- /* clustrmaps visitor-map widget — hardcoded here instead of rendering
         contact.md body because Goldmark fights the <body>-wrapped script.
         URL captured from production baseline; change if map ID rotates.
         Required by A10 acceptance gate (third-party scripts preserved). */ -}}
  <div class="clustrmaps-wrap" style="margin-top: var(--space-6);">
    <script type="text/javascript" id="clustrmaps"
            src="//cdn.clustrmaps.com/map_v2.js?cl=080808&w=600&t=tt&d=hTTCwL6j2b86VfyaWebPgMSN4J3Jg5gJFLiOUy8AcjE&co=ffffff&cmo=3acc3a&cmn=ff5353&ct=808080"></script>
  </div>
</section>
