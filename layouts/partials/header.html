<header class="site-header">
  <a class="brand" href="{{ "/" | relURL }}">{{ .Site.Title | default "Home" }}</a>
  <nav>
    {{- range site.Menus.main }}
    <a href="{{ .URL | relURL }}"{{ if $.IsMenuCurrent "main" . }} aria-current="page"{{ end }}>{{ .Name }}</a>
    {{- end }}
  </nav>
  <button class="theme-toggle"
    onclick="var r=document.documentElement;var n=r.getAttribute('data-theme')==='dark'?'light':'dark';r.setAttribute('data-theme',n);try{localStorage.setItem('theme',n);}catch(e){}">theme</button>
</header>
